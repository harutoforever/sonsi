<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尊師！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Antique&display=swap');

  :root {
    --gold: #d4a017;
    --dark-gold: #8b6914;
    --ink: #0a0500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Noto Serif JP', serif;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    height: 640px;
    max-width: 100vw;
    max-height: 100vh;
    box-shadow: 0 0 50px rgba(0,0,0,1);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: pointer;
    background: #000;
  }

  /* ===== HUD ===== */
  #hud {
    position: absolute;
    top: 12px;
    right: 12px;
    text-align: right;
    pointer-events: none;
    z-index: 5;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(212,160,23,0.3);
    padding: 10px 15px;
    border-radius: 4px;
    backdrop-filter: blur(5px);
  }

  #rankDisplay { font-family: 'Zen Antique', serif; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
  #poaDisplay { font-size: 12px; color: rgba(212,160,23,0.8); margin-top: 2px; }
  #expBar { width: 140px; height: 5px; background: rgba(212,160,23,0.1); margin-top: 10px; overflow: hidden; border-radius: 3px; }
  #expFill { height: 100%; background: linear-gradient(90deg, var(--dark-gold), var(--gold)); transition: width 0.3s; }

  /* PSI STATUS */
  #psiControl {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  #psiStatusDisplay {
    width: 64px;
    height: 64px;
    background: rgba(0,0,0,0.7);
    border: 2px solid var(--gold);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(212, 160, 23, 0.3);
  }
  #psiStatusDisplay.empty { opacity: 0.3; border-color: #444; box-shadow: none; }
  #psiStatusDisplay .psi-text { color: var(--gold); font-size: 16px; font-weight: 900; }
  #psiStatusDisplay span { color: var(--gold); font-size: 14px; font-weight: 900; margin-top: 2px; }
  
  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
    overflow: hidden;
  }
  .screen.hidden { display: none; }
  #titleScreen { background: radial-gradient(circle at center, #1a0a00 0%, #000 100%); }
  
  .title-img {
    width: 240px;
    height: auto;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px var(--gold);
  }

  .title-main {
    font-family: 'Zen Antique', serif; font-size: 85px; color: var(--gold);
    text-shadow: 0 0 20px rgba(196, 19, 134, 0.8), 4px 4px 0 #8b0000;
    margin-bottom: 40px;
  }

  .btn-start {
    background: linear-gradient(135deg, var(--gold), var(--dark-gold));
    color: #000; border: none; padding: 18px 50px;
    font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 900;
    cursor: pointer; border-radius: 5px; transition: transform 0.2s;
  }
  .btn-start:hover { transform: scale(1.05); }

  /* GameOver Style */
  #gameoverScreen { background: rgba(0,0,0,0.9); }
  .gameover-img {
    width: 300px;
    height: auto;
    border: 2px solid var(--gold);
    margin-bottom: 20px;
    border-radius: 5px;
  }

  /* Ascension Message */
  #ascensionMsg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--gold);
    font-family: 'Zen Antique', serif;
    font-size: 40px;
    text-shadow: 0 0 20px #fff;
    pointer-events: none;
    white-space: nowrap;
    animation: pulseMsg 2s infinite ease-in-out;
    display: none;
    z-index: 15;
  }

  @keyframes pulseMsg {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="480" height="640"></canvas>

  <div id="hud">
    <div id="rankDisplay">サマナ見習</div>
    <div id="poaDisplay">ポア数: 0</div>
    <div id="expBar"><div id="expFill" style="width:0%"></div></div>
  </div>

  <div id="psiControl">
    <div id="psiStatusDisplay">
      <div class="psi-text">PSI</div>
      <span id="psiCountText">x1</span>
    </div>
    <div style="color: #fff; font-size: 9px; font-weight: bold; text-align: center; margin-top: 4px; text-shadow: 0 0 4px #000;">AUTO SHIELD</div>
  </div>

  <div id="ascensionMsg">解脱しよう！</div>

  <div class="screen" id="titleScreen">
    <img src="img/title.jpg" alt="Title" class="title-img" id="titleImgElement">
    <div class="title-main">尊師！</div>
    <button class="btn-start" id="btnStart">修行</button>
  </div>

  <div class="screen hidden" id="gameoverScreen">
    <img src="" alt="GameOver Result" id="gameoverImg" class="gameover-img">
    <div id="gameoverReason" style="font-family:'Zen Antique'; font-size:36px; color:#ff4444; margin:15px 0;">世俗に落ちた</div>
    <div id="gameoverStats" style="color:var(--gold); font-size:18px; margin-bottom:10px;"></div>
  </div>
</div>

<script>
// ============================================================
// ASSETS
// ============================================================
const assets = {
  sonsi: new Image(),
  police: new Image(),
  helicopter: new Image(),
  camera: new Image(),
  lawyer: new Image(),
  psi: new Image(),
  clear: new Image(),
  title: new Image(),
  teki: new Image(),
  mijuku: new Image(),
  sezoku: new Image()
};
assets.sonsi.src = 'img/sonsi.png';
assets.police.src = 'img/police.png';
assets.helicopter.src = 'img/helicopter.png';
assets.camera.src = 'img/camera.png';
assets.lawyer.src = 'img/lawyer.png';
assets.psi.src = 'img/psi.png';
assets.clear.src = 'img/clear.jpg';
assets.title.src = 'img/title.jpg';
assets.teki.src = 'img/teki.jpg';
assets.mijuku.src = 'img/mijuku.jpg';
assets.sezoku.src = 'img/sezoku.jpg';

Object.keys(assets).forEach(k => assets[k].onload = () => assets[k].loaded = true);

// ============================================================
// SOUNDS
// ============================================================
const sounds = {
  jump: new Audio('sounds/sonsi.mp3'),
  button: new Audio('sounds/button.mp3')
};

function playSfx(audio) {
  audio.currentTime = 0;
  audio.play().catch(e => {});
}

// ============================================================
// ENGINE CONFIG
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const PARAMS = {
  gravity: 0.26,
  jumpForce: -6.2,
  playerRadius: 38,
  itemRadius: 22,
  itemSpawnInterval: 800,  
  postHitInvincibility: 1500,
  expPerSecond: 20,
  poaBonus: 35,
  rankThresholds: [0, 600, 1000, 2300, 4800, 7200],
  beamCooldown: 70
};

let state = 'title';
let player, enemies, items, particles, beams;
let exp, poa, rank, frame, bgOffset = 0, gridOffset = 0;
let psiCount = 1;
let psiActive = false, psiEndTime = 0;
let beamTimer = 0;
let gameStarted, animFrame;
let clearTimer = 0;
let heliSpawnChance = 0; // ヘリの出現確率（0.0〜1.0）
let shogoshiTimer = 0;   // 正悟師になってからのフレームカウンター

const RANKS = ['サマナ見習', 'サマナ', '師', '正悟師', '正大師', '尊師'];
const RANK_COLORS = ['#aaa', '#88ccff', '#ffcc44', '#ff8844', '#ffd700', '#ffffff'];

const ENEMY_TYPES = [
  { name: 'police',     color: '#3366ff', move: 'linear', img: assets.police, sizeMult: 2.8 },
  { name: 'helicopter', color: '#44aa44', move: 'wave',   img: assets.helicopter, sizeMult: 5.5 },
  { name: 'camera',     color: '#888',    move: 'linear', img: assets.camera, sizeMult: 2.5 },
  { name: 'lawyer',     color: '#ccaa44', move: 'linear', img: assets.lawyer, sizeMult: 2.8 },
];

function initGame() {
  player = { x: 100, y: H / 2, vy: 0, r: PARAMS.playerRadius, alive: true, blinking: false };
  enemies = []; items = []; particles = []; beams = [];
  exp = 0; poa = 0; rank = 0; frame = 0;
  psiCount = 1;
  psiActive = false; psiEndTime = 0;
  beamTimer = 0;
  clearTimer = 0;
  gameStarted = false;
  document.getElementById('ascensionMsg').style.display = 'none';
  updateHUD();
  updatePSIUI();
}

function updatePSIUI() {
  const display = document.getElementById('psiStatusDisplay');
  const countText = document.getElementById('psiCountText');
  countText.textContent = 'x' + psiCount;
  if (psiCount > 0) display.classList.remove('empty');
  else display.classList.add('empty');
}

function triggerShield() {
  psiCount--;
  psiActive = true;
  psiEndTime = Date.now() + PARAMS.postHitInvincibility;
  player.blinking = true;
  updatePSIUI();
  spawnParticles(player.x, player.y, '#ffd700', 40);
}

// ============================================================
// ATTACK LOGIC
// ============================================================
function shootBeams() {
  if (rank < 2 || rank === 5) return; 

  const beamSpeed = 8;
  if (rank === 2) createBeam(player.x + 20, player.y, beamSpeed, 0);
  else if (rank === 3) { 
    createBeam(player.x + 20, player.y, beamSpeed, -0.2);
    createBeam(player.x + 20, player.y, beamSpeed, 0);
    createBeam(player.x + 20, player.y, beamSpeed, 0.2);
  }
  else if (rank === 4) { 
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i;
      createBeam(player.x, player.y, beamSpeed, angle);
    }
  }
}

function createBeam(x, y, speed, angle) {
  beams.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r: 8, color: '#ffff00', alive: true });
}

// ============================================================
// CORE LOGIC
// ============================================================
function jump() {
  if (!player.alive || state !== 'playing' ) return;
  if (!gameStarted) gameStarted = true;
  player.vy = PARAMS.jumpForce;
  playSfx(sounds.jump);
}

function spawnEnemy() {
  if (rank === 5) return; 

  // --- 【修正】敵の総数をマイルドに制限 ---
  let numEnemies = 1;
  if (rank === 1) numEnemies = 2; // サマナ
  if (rank === 2) numEnemies = 3; // 師（ここを増やす）
  if (rank >= 3) numEnemies = 4;

  const gapHeight = 160 - (rank * 8);
  const gapY = 80 + Math.random() * (H - 180 - gapHeight);
  const spawnX = W + 150;
  const speed = -(2.3 + rank * 0.5); // スピードの上昇幅もわずかに緩和

  // --- 【修正】「壁（縦並び）」の生成ロジック ---
  // 30%の確率で上下に敵を配置
  if (rank >= 1 && Math.random() < 0.3) {
      // 上の敵
      enemies.push(makeEnemyObj(spawnX, gapY - 55, speed));
      // 下の敵
      enemies.push(makeEnemyObj(spawnX, gapY + gapHeight + 55, speed));
      
      // 3体目の敵がいる場合は、少し時間をずらして（Xを離して）配置
      if (numEnemies > 3) {
          enemies.push(makeEnemyObj(spawnX + 120, Math.random() * H, speed));
      }
  } else {
      // 通常のランダム配置
      for (let i = 0; i < numEnemies; i++) {
        let y = Math.random() * H;
        // 隙間（安全地帯）に入り込まないように調整
        if (y > gapY && y < gapY + gapHeight) {
           y = (Math.random() < 0.5) ? gapY - 55 : gapY + gapHeight + 55;
        }
        // 敵同士の距離を少し離す (i * 80)
        enemies.push(makeEnemyObj(spawnX + i * 80, y, speed));
      }
  }
}

function makeEnemyObj(x, y, vx) {
  let type;
  let nonHeli = ENEMY_TYPES.filter(t => t.name !== 'helicopter');
  
  // 固定値 0.2 ではなく、 heliSpawnChance を使用する
  if (rank >= 3 && Math.random() < heliSpawnChance) { 
    type = ENEMY_TYPES.find(t => t.name === 'helicopter');
  } else {
    type = nonHeli[Math.floor(Math.random() * nonHeli.length)];
  }

  const actualVx = type.name === 'helicopter' ? vx * 0.75 : vx;
  return { type, x, y: Math.max(40, Math.min(H-40, y)), baseY: y, r: 34, vx: actualVx, phase: Math.random() * Math.PI * 2, alive: true };
}

function update() {
  if (state === 'clear_sequence') {
    clearTimer++;
    player.vy += PARAMS.gravity;
    player.y += player.vy;
    return;
  }
  if (!gameStarted) return;
  frame++;
  bgOffset -= 0.5;
  gridOffset -= 4.5 + (rank * 0.4);

  player.vy += PARAMS.gravity;
  player.y += player.vy;

  if (player.y > H + player.r * 0.8) return gameOver('世俗に落ちた');
  if (player.y < -player.r * 0.8) {
    if (rank === 5) return startFinalClear();
    else return gameOver('未熟な解脱をしてしまった');
  }

  if (psiActive) {
    const remaining = psiEndTime - Date.now();
    player.blinking = true;
    if (remaining <= 0) { psiActive = false; player.blinking = false; }
  }

  if (rank >= 2 && rank < 5) {
    beamTimer++;
    if (beamTimer >= PARAMS.beamCooldown) { shootBeams(); beamTimer = 0; }
  }

  exp += PARAMS.expPerSecond / 60;
  checkRankUp();

  // 正悟師(rank 3)以上の時、時間をカウントしてヘリ出現率を徐々に上げる
  if (rank >= 3) {
    shogoshiTimer++;
    // 約1分（3600フレーム）かけて、出現率が最大（例: 0.4まで）上がるように計算
    heliSpawnChance = Math.min(0.4, shogoshiTimer / 9000); 
  } else {
    shogoshiTimer = 0;
    heliSpawnChance = 0;
  }

  const interval = Math.max(50, 100 - rank * 8);
  if (frame % interval === 0) spawnEnemy();
  
  if (frame % PARAMS.itemSpawnInterval === 0 && rank < 5) {
    items.push({ x: W + 50, y: 120 + Math.random()*(H-240), r: PARAMS.itemRadius, vx: -3.5, alive: true, pulse: 0 });
  }

  beams.forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x > W + 50 || b.x < -50 || b.y > H + 50 || b.y < -50) b.alive = false;
    enemies.forEach(e => {
      if (e.alive && b.alive) {
        const dx = b.x - e.x, dy = b.y - e.y;
        if (Math.sqrt(dx*dx + dy*dy) < b.r + e.r) {
          b.alive = false; e.alive = false; poa++; exp += PARAMS.poaBonus;
          spawnParticles(e.x, e.y, e.type.color, 12); updateHUD();
        }
      }
    });
  });
  beams = beams.filter(b => b.alive);

  enemies.forEach(e => {
    e.x += e.vx;
    if (e.type.name === 'helicopter') { e.phase += 0.018; e.y = (H/2) + Math.sin(e.phase) * (H/2 - 70); }
    else if (e.type.move === 'wave') { e.phase += 0.04; e.y = e.baseY + Math.sin(e.phase) * 80; }
    if (e.x + e.r * 3 < -300) e.alive = false;
    if (e.alive && circleHit(player, e)) {
      if (psiActive) { e.alive = false; poa++; exp += PARAMS.poaBonus; spawnParticles(e.x, e.y, e.type.color, 15); updateHUD(); }
      else if (psiCount > 0) { e.alive = false; poa++; exp += PARAMS.poaBonus; triggerShield(); updateHUD(); }
      else gameOver('捕まった');
    }
  });
  enemies = enemies.filter(e => e.alive);

  items.forEach(it => {
    it.x += it.vx; it.pulse += 0.05;
    if (it.x + it.r < -100) it.alive = false;
    if (it.alive && circleHit(player, it)) {
      it.alive = false; psiCount++; updatePSIUI(); spawnParticles(it.x, it.y, '#ffd700', 30);
    }
  });
  items = items.filter(it => it.alive);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function circleHit(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  if (b.type && b.type.name === 'helicopter') {
    const distSq = (dx * 0.8) * (dx * 0.8) + (dy * 1.0) * (dy * 1.0);
    const combinedR = (a.r + b.r * 1.2); 
    return distSq < combinedR * combinedR;
  }
  return Math.sqrt(dx * dx + dy * dy) < (a.r + b.r) * 0.92;
}

function checkRankUp() {
  if (rank < 5 && exp >= PARAMS.rankThresholds[rank + 1]) {
    rank++;
    spawnParticles(player.x, player.y, RANK_COLORS[rank], 35);
    updateHUD();
    if (rank === 5) document.getElementById('ascensionMsg').style.display = 'block';
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, color, life: 45 });
  }
}

function startFinalClear() {
  state = 'clear_sequence';
  clearTimer = 0;
  document.getElementById('ascensionMsg').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('psiControl').style.display = 'none';
}

// ============================================================
// RENDER
// ============================================================
function draw() {
  if (state === 'clear_sequence') {
    drawClearSequence();
    return;
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = '#fff';
  for(let i=0; i<45; i++) {
    const x = (i * 137 + bgOffset) % W;
    const y = (i * 251) % H;
    ctx.globalAlpha = 0.25;
    ctx.beginPath(); ctx.arc(x < 0 ? x + W : x, y, 1, 0, 7); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(212, 160, 23, 0.08)';
  ctx.lineWidth = 1;
  for(let i=0; i<15; i++) {
    const x = (i * 64 + gridOffset) % W;
    const rx = x < 0 ? x + W : x;
    ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, H); ctx.stroke();
  }

  // 境界線
  ctx.strokeStyle = 'rgba(212, 160, 23, 0.7)';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(W, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H-2); ctx.lineTo(W, H-2); ctx.stroke();

  // ビーム
  beams.forEach(b => {
    ctx.save(); ctx.fillStyle = b.color; ctx.shadowBlur = 15; ctx.shadowColor = '#ffff00';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  });

  particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/45; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill(); });
  ctx.globalAlpha = 1;

  items.forEach(it => {
    ctx.save(); ctx.translate(it.x, it.y);
    const p = 1 + Math.sin(frame * 0.1) * 0.15;
    const g = ctx.createRadialGradient(0,0,0, 0,0, it.r * 2.5 * p);
    g.addColorStop(0, 'rgba(255,215,0,0.4)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0, it.r*2.5*p, 0, 7); ctx.fill();
    const s = it.r * 2.5;
    if (assets.psi.loaded) ctx.drawImage(assets.psi, -s/2, -s/2, s, s);
    ctx.restore();
  });

  enemies.forEach(e => {
    ctx.save(); ctx.translate(e.x, e.y);
    const s = e.r * e.type.sizeMult;
    if (e.type.img.loaded) ctx.drawImage(e.type.img, -s/2, -s/2, s, s);
    ctx.restore();
  });

  if (player.alive) {
    if (player.blinking && Math.floor(frame / 4) % 2 === 0) {} else {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.vy * 0.05);
      if (rank >= 2) {
        const auraPulse = 1.2 + Math.sin(frame * 0.1) * 0.2;
        const gAura = ctx.createRadialGradient(0, 0, player.r, 0, 0, player.r * 2.5 * auraPulse);
        gAura.addColorStop(0, rank === 5 ? 'rgba(255,255,255,0.6)' : 'rgba(212, 160, 23, 0.4)');
        gAura.addColorStop(1, 'rgba(212, 160, 23, 0)');
        ctx.fillStyle = gAura;
        ctx.beginPath(); ctx.arc(0, 0, player.r * 2.5 * auraPulse, 0, Math.PI * 2); ctx.fill();
      }
      if (psiActive) {
        const pulse = 1.3 + Math.sin(frame*0.2)*0.2;
        const g = ctx.createRadialGradient(0,0,10, 0,0, player.r*2.8*pulse);
        g.addColorStop(0, 'rgba(255, 215, 0, 0.5)'); g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0,0, player.r*2.8*pulse, 0, 7); ctx.fill();
      }
      const s = player.r * 3.3;
      if (assets.sonsi.loaded) ctx.drawImage(assets.sonsi, -s/2, -s/2, s, s);
      ctx.restore();
    }
  }
}

function drawClearSequence() {
  if (assets.clear.loaded) {
    ctx.drawImage(assets.clear, 0, 0, W, H);
  } else {
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W);
    g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#fffde0'); g.addColorStop(1, '#ffd700');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  if (clearTimer < 60) {
    ctx.fillStyle = `rgba(255,255,255, ${1 - clearTimer/60})`;
    ctx.fillRect(0,0,W,H);
  }

  if (clearTimer > 180) {
    ctx.save();
    ctx.fillStyle = 'var(--gold)';
    ctx.font = '900 80px "Zen Antique", serif';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#fff';
    ctx.fillText('解脱！', W/2, H/2 + 30);
    ctx.restore();
  }

  if (clearTimer > 600) { 
    cancelAnimationFrame(animFrame);
    document.getElementById('titleScreen').classList.remove('hidden');
    state = 'title';
  }
}

function updateHUD() {
  const rEl = document.getElementById('rankDisplay');
  rEl.textContent = RANKS[rank]; rEl.style.color = RANK_COLORS[rank];
  document.getElementById('poaDisplay').textContent = `ポア数: ${poa}`;
  const next = PARAMS.rankThresholds[rank+1] || PARAMS.rankThresholds[rank];
  const prev = PARAMS.rankThresholds[rank];
  const pct = rank >= 5 ? 100 : ((exp-prev)/(next-prev)*100);
  document.getElementById('expFill').style.width = pct + '%';
}

function loop() {
  update(); draw();
  if (state === 'playing' || state === 'clear_sequence') {
    if (state === 'playing') updateHUD();
    animFrame = requestAnimationFrame(loop);
  }
}

function startGame() {
  playSfx(sounds.button);
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'block';
  document.getElementById('psiControl').style.display = 'flex';
  state = 'playing'; initGame(); loop();
}

function gameOver(reason) {
  state = 'gameover'; player.alive = false; cancelAnimationFrame(animFrame);
  draw();
  
  const gImg = document.getElementById('gameoverImg');
  const rTxt = document.getElementById('gameoverReason');
  
  if (reason === '捕まった') {
    gImg.src = 'img/teki.jpg';
    rTxt.textContent = '捕まった';
  } else if (reason === '未熟な解脱をしてしまった') {
    gImg.src = 'img/mijuku.jpg';
    rTxt.textContent = '未熟な解脱をしてしまった';
  } else {
    gImg.src = 'img/sezoku.jpg';
    rTxt.textContent = '世俗に落ちた';
  }

  document.getElementById('gameoverStats').textContent = `到達位: ${RANKS[rank]} | ポア数: ${poa}`;
  document.getElementById('gameoverScreen').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('psiControl').style.display = 'none';
  document.getElementById('ascensionMsg').style.display = 'none';
  
  setTimeout(() => {
    document.getElementById('gameoverScreen').classList.add('hidden');
    document.getElementById('titleScreen').classList.remove('hidden');
    state = 'title';
  }, 4000);
}

document.getElementById('btnStart').onclick = startGame;

window.addEventListener('keydown', (e) => {
  // state === 'playing' を条件にすることで、クリア画面での誤動作を防ぐ
  if (e.code === 'Space' || e.code === 'ArrowUp') { 
    if (state === 'playing') jump(); 
  }
});

const trigger = (e) => {
  e.preventDefault(); 
  // プレイ中のみjump()を呼び出す。これによりsonsi.mp3が再生されなくなる。
  if (state === 'playing') jump();
};

canvas.addEventListener('mousedown', trigger);
canvas.addEventListener('touchstart', trigger, { passive: false });
</script>
